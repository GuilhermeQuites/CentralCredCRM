services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: centralcred-app
    working_dir: /var/www
    command: sh -c "php-fpm"
    volumes:
      - storage_data:/var/www/storage
      - public_data:/var/www/public
    depends_on:
      - mysql

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: centralcred-scheduler
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: centralcred-nginx
    ports:
      - "8000:80"
    volumes:
      - public_data:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: centralcred-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: centralcred
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: centralcred
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  storage_data:
  public_data:
